services:
  server:
    build: .
    command: python3 server.py --host 0.0.0.0 --port 8080 --db /app/data/mini_drop.sqlite3
    ports:
      - "8080:8080"
    volumes:
      - mini_drop_data:/app/data

  agent:
    build: .
    command: python3 agent.py --server http://server:8080 --agent-id docker-agent --allow-synthetic
    depends_on:
      - server

volumes:
  mini_drop_data:

